name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ljozolszasxppianyaac.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: https://curador-de-noticias.vercel.app
          NEXT_PUBLIC_SITE_NAME: NoticIA

  validate-pipeline:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || true
          pip install ruff mypy

      - name: Lint with ruff
        run: ruff check src/

      - name: Type check (non-strict)
        run: mypy src/openclaw --ignore-missing-imports --no-strict-optional || true
        continue-on-error: true

      - name: Syntax validation
        run: python -m py_compile src/openclaw/agents/dispatcher.py && python -m py_compile src/openclaw/scheduler_ollama.py && echo "All core files compile OK"
